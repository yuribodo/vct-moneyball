services:
  postgres:
    image: postgres:16
    container_name: vct_moneyball_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vct}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vct}
      POSTGRES_DB: ${POSTGRES_DB:-vct_moneyball}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vct} -d ${POSTGRES_DB:-vct_moneyball}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
